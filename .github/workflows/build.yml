name: C Build Test

on:
  push:
    branches: [windows]
  pull_request:
    branches: [windows]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build

    - name: Build project
      run: cmake --build build

    - name: Convert to assembly
      run: cmake --build build --target asm

    - name: Run Basic Tests
      shell: powershell
      run: |
        if (Test-Path "./build/Terminal.exe")
        {
          Write-Host "Build successful!"
        }
        else
        {
          Write-Host "Executable not found!"
          exit 1
        }
